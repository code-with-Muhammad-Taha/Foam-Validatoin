<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>
<body>

<h1 id="welcome"></h1>

<script>
  let user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    window.location.href = "index.html";
  } else {
    document.getElementById("welcome").innerText =
      "Welcome " + user.firstName + " " + user.lastName;
  }
</script>

</body>
</html>
